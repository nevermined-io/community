name: Feature Request
description: Suggest a new feature or improvement for Nevermined
title: "[Feature]: "
labels: ["feature-request", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea so we can evaluate it.

  - type: dropdown
    id: product
    attributes:
      label: Product / Component
      description: Which Nevermined product or component does this relate to?
      options:
        - App
        - TypeScript SDK
        - Python SDK
        - Protocol
        - Docs
        - MCP
        - x402
        - OpenClaw Plugin
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Why is this feature needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that would help us understand the request.
    validations:
      required: false
