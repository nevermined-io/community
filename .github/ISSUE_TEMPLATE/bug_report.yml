name: Bug Report
description: Report a bug in a Nevermined product or component
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below so we can investigate.

  - type: dropdown
    id: product
    attributes:
      label: Product / Component
      description: Which Nevermined product or component is affected?
      options:
        - App
        - TypeScript SDK
        - Python SDK
        - Protocol
        - Docs
        - MCP
        - x402
        - OpenClaw Plugin
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: [e.g., macOS 15, Ubuntu 24.04]
        - Browser: [e.g., Chrome 130]
        - SDK version: [e.g., @nevermined-io/payments 0.5.0]
        - Node.js / Python version: [e.g., Node 20, Python 3.12]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Add any relevant logs, error messages, or screenshots.
    validations:
      required: false
