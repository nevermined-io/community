name: Feedback
description: Share general feedback about Nevermined
title: "[Feedback]: "
labels: ["feedback", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your feedback! Let us know what you think about Nevermined.

  - type: dropdown
    id: product
    attributes:
      label: Product / Component
      description: Which Nevermined product or component does this relate to?
      options:
        - App
        - TypeScript SDK
        - Python SDK
        - Protocol
        - Docs
        - MCP
        - x402
        - OpenClaw Plugin
        - CLI
        - Other
    validations:
      required: true

  - type: dropdown
    id: sentiment
    attributes:
      label: Sentiment
      description: How would you describe your overall experience?
      options:
        - Positive
        - Neutral
        - Negative
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: Share your thoughts, suggestions, or experience.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other details that would help us understand your feedback.
    validations:
      required: false
