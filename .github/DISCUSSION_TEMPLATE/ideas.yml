title: "[Idea]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share your idea with the Nevermined community! We love hearing how we can improve.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe your idea clearly.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this idea valuable? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional Details
      description: Any mockups, references, or extra context.
    validations:
      required: false
